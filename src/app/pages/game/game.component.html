<div class="game-container page-container">
  
  <!-- Letter Overlay & Display -->
  <app-letter-display 
    [letter]="currentLetter()" 
    [showOverlay]="showLetterOverlay()">
  </app-letter-display>

  <!-- Game Header -->
  <header class="game-header card glass">
    <div class="header-main">
      <div class="round-info">
        <span class="label">Round</span>
        <span class="value">{{ roundNumber() }}</span>
      </div>
      
      <!-- Countdown Timer -->
      <app-countdown-timer
        [serverTime]="serverTime()"
        [durationSec]="timerDuration()"
        [isLocked]="isLocked()"
        (expired)="onTimerExpired()">
      </app-countdown-timer>
    </div>
  </header>

  <!-- Answer Grid -->
  <app-answer-grid
    [categories]="categories()"
    [currentLetter]="currentLetter()"
    [isLocked]="isLocked()"
    (answersChanged)="onAnswersChanged($event)">
  </app-answer-grid>

  <!-- Action Button -->
  <footer class="game-footer">
    <button 
      class="btn btn-primary btn-lg basta-btn" 
      [disabled]="!isRoundRunning"
      (click)="callBasta()"
    >
      BASTA!
    </button>
  </footer>

</div>
