<div class="game-container page-container">
  
  @if (gameOverReason()) {
    <div class="game-over-overlay glass">
      <div class="game-over-card card">
        <h2>Game Over</h2>
        <p>{{ gameOverReason() }}</p>
        <button class="btn btn-primary" (click)="router.navigate(['/home'])">Back to Menu</button>
      </div>
    </div>
  }
  
  <!-- Letter Overlay & Display -->
  <app-letter-display 
    [letter]="currentLetter()" 
    [showOverlay]="showLetterOverlay()">
  </app-letter-display>

  <!-- Game Header -->
  <header class="game-header card glass">
    <div class="header-main">
      <div class="round-info">
        <span class="label">Round</span>
        <span class="value">{{ roundNumber() }}</span>
      </div>
      
      <!-- Countdown Timer -->
      <app-countdown-timer
        [serverTime]="serverTime()"
        [durationSec]="timerDuration()"
        [isLocked]="isLocked()"
        (expired)="onTimerExpired()">
      </app-countdown-timer>
    </div>
  </header>

  <!-- Main Content Phase Switch -->
  <main class="game-main">
    @switch (currentPhase()) {
      @case ('playing') {
        <app-answer-grid
          [categories]="categories()"
          [currentLetter]="currentLetter()"
          [isLocked]="isLocked()"
          (answersChanged)="onAnswersChanged($event)">
        </app-answer-grid>
      }
      @case ('validating') {
        @if (scoringData()) {
          <app-validation-grid
            [scoringData]="scoringData()!"
            [categories]="categories()"
            [currentUserId]="playerState.currentState.userId!"
            [isSubmitting]="isSubmittingValidation()"
            (onValidated)="onValidationSubmitted($event)">
          </app-validation-grid>
        }
      }
      @case ('results') {
        <app-round-results
          [scores]="roundScores()"
          [categories]="categories()"
          [currentUserId]="playerState.currentState.userId!"
          [isHost]="playerState.currentState.userId === playerState.currentState.hostUserId"
          (onNextRound)="startNextRound()">
        </app-round-results>
      }
    }
  </main>

  <!-- Action Button (Only in playing phase) -->
  @if (currentPhase() === 'playing') {
    <footer class="game-footer">
      <button 
        class="btn btn-primary btn-lg basta-btn" 
        [disabled]="!isRoundRunning"
        (click)="callBasta()"
      >
        BASTA!
      </button>
    </footer>
  }


</div>
