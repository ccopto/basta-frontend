<div class="leaderboard-container">
  <!-- Podium for Top 3 -->
  <div class="podium-container">
    @for (player of podium; track $index) {
      <div class="podium-spot" [ngClass]="'spot-' + $index" [class.empty]="!player">
        @if (player) {
          <div class="player-info animate-scale-up">
            <span class="nickname">{{ player.nickname }}</span>
            <span class="score">{{ player.cumulativeScore }} pts</span>
          </div>
          <div class="pedestal">
            <span class="rank-num">{{ player.rank }}</span>
          </div>
        }
      </div>
    }
  </div>

  <!-- List for Rank 4+ -->
  @if (remaining.length > 0) {
    <div class="remaining-list glass-panel animate-slide-up">
      @for (player of remaining; track player.userId) {
        <div class="list-item">
          <span class="rank">#{{ player.rank }}</span>
          <span class="nickname">{{ player.nickname }}</span>
          <span class="score">{{ player.cumulativeScore }} pts</span>
        </div>
      }
    </div>
  }
</div>
